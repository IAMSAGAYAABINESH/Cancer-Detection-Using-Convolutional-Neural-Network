name: Deploy App to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_IP }}
        username: 'ubuntu'
        key: ${{ secrets.SSH_KEY }}
        port: 22
        script: |
          # 1. Bypass the "dubious ownership" security check for this folder
          git config --global --add safe.directory /home/ubuntu/lung_cancer
          
          # 2. Ensure the directory exists and move into it
          mkdir -p /home/ubuntu/lung_cancer
          cd /home/ubuntu/lung_cancer

          # 3. Check if it's already a git repository; if not, initialize it
          if [ ! -d ".git" ]; then
            echo "--- Initializing Git Repository on Server ---"
            git init
            git remote add origin https://github.com/IAMSAGAYAABINESH/Cancer-Detection-Using-Convolutional-Neural-Network.git
          fi

          # 4. Pull and reset your code cleanly
          echo "--- Fetching and overwriting with latest changes ---"
          git fetch origin main
          git reset --hard origin/main
