name: Deploy App to Server

on:
  push:
    branches:
      - main  # Triggers the pipeline every time you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_IP }}
        username: 'ubuntu'
        key: ${{ secrets.SSH_KEY }}
        port: 22
        script: |
          # 1. Ensure the directory exists first
          mkdir -p /home/ubuntu/lung_cancer

          # 2. Fix folder permissions so the 'ubuntu' user owns everything recursively
          echo "--- Fixing folder permissions ---"
          sudo chown -R ubuntu:ubuntu /home/ubuntu/lung_cancer

          # 3. Bypass the git "dubious ownership" security check for this folder
          git config --global --add safe.directory /home/ubuntu/lung_cancer
          
          # 4. Move into the project directory
          cd /home/ubuntu/lung_cancer

          # 5. Check if it's already a git repository; if not, initialize it automatically
          if [ ! -d ".git" ]; then
            echo "--- Initializing Git Repository on Server ---"
            git init
            git remote add origin https://github.com/IAMSAGAYAABINESH/Cancer-Detection-Using-Convolutional-Neural-Network.git
          fi

          # 6. Fetch and overwrite files with the latest changes from GitHub
          echo "--- Fetching and overwriting with latest changes ---"
          git fetch origin main
          git reset --hard origin/main
